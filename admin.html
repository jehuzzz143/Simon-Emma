
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP Admin</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>RSVP Admin</h1>
        <p class="sub">Simple dashboard for guest RSVPs and message display control.</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">

    <a href="index.html"
       target="_blank"
       class="btn secondary"
       style="text-decoration:none; display:inline-flex; align-items:center;">
       Open Main Website
    </a>

    <button class="btn" id="send-reminders-btn">
        📧 Send Wedding Reminder
    </button>

    <button class="btn" id="open-create-btn">
        Add guest / mock message
    </button>

</div>
    </div>

    <div id="page-status" class="status" role="status" aria-live="polite"></div>

    <div class="stats">
      <div class="card stat">
        <div class="stat-label">Total RSVP count</div>
        <div class="stat-value" id="stat-rsvp-count">0</div>
      </div>
      <div class="card stat">
        <div class="stat-label">Total number of guests</div>
        <div class="stat-value" id="stat-total-guests">0</div>
      </div><div class="card stat">
        <div class="stat-label">Decline Guests</div>
        <div class="stat-value" id="stat-total-guests-decline">0</div>
      </div>
      <div class="card stat">
        <div class="stat-label">Approved messages</div>
        <div class="stat-value" id="stat-approved-messages">0</div>
      </div>
    </div>

    <div class="card panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Attendance</th>
              <th>Guests</th>
              <th>Message</th>
              <th>Website status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="rsvp-table-body">
            <tr><td colspan="7" class="empty">Loading RSVP records…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="create-modal">
    <div class="modal">
      <div class="modal-head">
        <strong>Add guest / mock message</strong>
        <button class="btn secondary small" type="button" id="close-create-btn">Close</button>
      </div>

      <form id="create-form">
        <div class="form-grid">
          <div class="field">
            <label for="create-name">Name</label>
            <input id="create-name" name="name" type="text">
          </div>
          <div class="field">
            <label for="create-email">Email</label>
            <input id="create-email" name="email" type="email">
          </div>
          <div class="field">
            <label for="create-attending">Attendance</label>
            <select id="create-attending" name="attending">
              <option value="Joyfully accepts">Joyfully accepts</option>
              <option value="Regretfully declines">Regretfully declines</option>
            </select>
          </div>
          <div class="field">
            <label for="create-guests">Guests</label>
            <input id="create-guests" name="guests" type="number" min="0" value="0">
          </div>
          <div class="field full">
            <label for="create-message">Message</label>
            <textarea id="create-message" name="message" placeholder="Optional message"></textarea>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn secondary" id="cancel-create-btn">Cancel</button>
          <button type="submit" class="btn" id="submit-create-btn">Save RSVP</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/admin.js"></script>
  <script src="js/email.js"></script>
</body>
</html>
