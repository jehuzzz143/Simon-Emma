<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Seat Finder</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div class="container">

        <h1>Find Your Seat</h1>

        <div class="search-box">

            <input
                type="text"
                id="search"
                placeholder="Start typing your name..."
                autocomplete="off">
        
            <div id="suggestions"></div>
        
        </div>
        
        <div id="loading">
            Loading guest list...
        </div>
        
        <div id="result"></div>

    </div>

    <script src="js/seat.js"></script>

</body>

</html>
